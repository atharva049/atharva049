<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- background gradient -->
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#020617"/>
<stop offset="50%" stop-color="#0f172a"/>
<stop offset="100%" stop-color="#020617"/>
</linearGradient>

<!-- moving light -->
<linearGradient id="scan">
<stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
<stop offset="50%" stop-color="#38bdf8" stop-opacity="0.35"/>
<stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
</linearGradient>

</defs>

<!-- background -->
<rect width="1280" height="320" fill="url(#bg)"/>

<!-- moving scan effect -->
<rect x="-400" y="0" width="400" height="320" fill="url(#scan)">
<animate attributeName="x" values="-400;1280" dur="7s" repeatCount="indefinite"/>
</rect>

<!-- text -->
<text x="640" y="130" text-anchor="middle"
font-size="52"
font-family="Segoe UI"
fill="white">

Hi 👋 I'm Atharva

</text>

<text x="640" y="170" text-anchor="middle"
font-size="24"
font-family="Segoe UI"
fill="#60a5fa">

Developer • Building DreamChat

</text>

<text x="640" y="210" text-anchor="middle"
font-size="18"
font-family="Segoe UI"
fill="#cbd5f5">

